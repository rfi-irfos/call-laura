# fly.toml for laura-api. NOT YET DEPLOYED — see plan Sec. 6/8: gated on the
# NVIDIA account issue (task #12), Laura's review-gate sign-off, and generating
# real LAURA_API_KEYS values before `fly deploy` is ever run.

app = 'laura-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
