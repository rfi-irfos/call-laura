# fly.toml for laura-api. Deployed 2026-07-12 to https://laura-api.fly.dev
# (both /mcp, keyless, and /review, key-gated). NVIDIA dependency removed
# entirely — laura-core is fully deterministic and local.

app = 'laura-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
